name: Build PocketDrop Installer

# Runs every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    # 1. Grab your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup the .NET 10 Environment
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Compile the WPF Application
    # This compiles it for 64-bit Windows and outputs it to a folder named 'publish'
    - name: Publish PocketDrop
      run: dotnet publish ./PocketDrop.csproj -c Release -r win-x64 --self-contained false -o ./publish

    # 4. Run Inno Setup to generate the installer
    # Looks exactly for Setup.iss in your root directory
    - name: Compile Inno Setup
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: ./Setup.iss

    # 5. Upload the finished installer to the GitHub workflow page
    # Grabs the compiled executable from the Output folder
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PocketDrop_Installer
        path: Output/*.exe