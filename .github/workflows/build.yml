name: Build PocketDrop Installer

# 1. The Trigger: This tells the action to ONLY run when you publish a new release!
on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-package:
    runs-on: windows-latest

    strategy:
      matrix:
        target: [win-x64, win-x86, win-arm64]
        include:
          - target: win-x64
            arch: x64
          - target: win-x86
            arch: x86
          - target: win-arm64
            arch: arm64

    # 2. Permissions: The robot needs permission to edit your release page
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish PocketDrop
      run: |
        dotnet publish ./PocketDrop/PocketDrop.csproj \
        -c Release \
        -r ${{ matrix.target }} \
        --self-contained true \
        -p:PublishSingleFile=true \
        -p:UseAppHost=true \
        -p:IncludeNativeLibrariesForSelfExtract=true \
        -o PublishOutput

    - name: Compile Inno Setup
      run: iscc /DMyAppArch="${{ matrix.arch }}" ./Setup.iss

    # 3. THE MAGIC STEP: This pushes the .exe directly to the release you just created!
    - name: Upload directly to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/*.exe