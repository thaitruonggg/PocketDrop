name: Build PocketDrop Installer

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 1. FIXED PATH: Points inside the PocketDrop folder based on your layout
    - name: Publish PocketDrop
      run: dotnet publish ./PocketDrop/PocketDrop.csproj -c Release -r win-x64 --self-contained false -o ./publish

    # 2. Setup.iss is in the root, so this stays exactly the same
    - name: Compile Inno Setup
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: ./Setup.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PocketDrop_Installer
        path: Output/*.exe